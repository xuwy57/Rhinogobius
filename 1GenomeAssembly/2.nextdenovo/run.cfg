[General]
job_type = local
job_prefix = nextDenovo
task = all # 'all', 'correct', 'assemble'
rewrite = yes # yes/no
deltmp = yes
rerun = 3
parallel_jobs = 1
input_type = raw
read_type = ont
input_fofn = ./input.fofn
workdir = ./01_rundir

[correct_option]
read_cutoff = 1k
genome_size = 0.9414g
pa_correction = 6
sort_options = -m 40g -t 32
minimap2_options_raw =  -t 32
correction_options = -p 15

[assemble_option]
minimap2_options_cns =  -t 32
nextgraph_options = -a 1
